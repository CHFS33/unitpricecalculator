<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Price Calculator</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2c3e50">
  </head>
  <body>
    <h1>Unit Price Comparison Calculator</h1>
    <div class="calculator">
      <input type="text" class="product" placeholder="Product"> </input>
      <div class="comparison">
      <div class="calculations" id="calculation1">           
      <input type="text" class="store" id="store1" placeholder="Store"></input>
      <input type="number" class="price" id="price1" placeholder="Price"></input>
      <input type="number" class="unit" id="unit1" placeholder="Unit"></input>
      <div class="unit-price" id="unit-price1">$ / unit</div>
      </div>
      <div class="calculations" id="calculation2">
      <input type="text" class="store" id="store2" placeholder="Store"></input>
      <input type="number" class="price" id="price2" placeholder="Price"></input>
      <input type="number" class="unit" id="unit2" placeholder="Unit"></input>
      <div class="unit-price" id="unit-price2">$ / unit</div>      
      </div>
       <div class="calculations"  id="calculation3">
      <input type="text" class="store" id="store3" placeholder="Store"></input>
      <input type="number" class="price" id="price3" placeholder="Price"></input>      
      <input type="number" class="unit" id="unit3" placeholder="Unit"></input>
      <div class="unit-price" id="unit-price3">$ / unit</div>         
      </div>       
      </div>  
        </div>
        <div  class="message" id="best-deal">Best Deal</div>
        <script src="script.js"></script>
  </body>
</html>
