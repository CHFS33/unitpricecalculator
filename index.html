<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unit Price Calculator</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Unit Price Comparison Calculator</h1>
    <div class="calculator">
      <div class="product">
        Product
        <div class="store" id="store1">
          Store 1
          <div class="price" id="price1">Price 1</div>
          <div class="unit" id="unit1">Unit 1</div>
          <div class="unit-price" id="unit-price1">Unit Price 1</div>
        </div>
        <div class="store" id="store2">
          Store 2
          <div class="price" id="price2">Price 2</div>
          <div class="unit" id="unit2">Unit 2</div>
          <div class="unit-price2" id="unit-price2">Unit Price 2</div>
        </div>
        <div class="store" id="store3">
          Store 3
          <div class="price" id="price3">Price 3</div>
          <div class="unit" id="unit3">Unit 3</div>
          <div class="unit-price3" id="unit-price3">Unit Price 3</div>
        </div>
      </div>
    </div>
  </body>
</html>
